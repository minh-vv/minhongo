# ─────────────────────────────────────────────────────────────────────────────
# Minhongo — Host Nginx Configuration (Production with SSL & Rate Limiting)
# ─────────────────────────────────────────────────────────────────────────────
# Save this file to /etc/nginx/sites-available/minhongo on your EC2 VPS,
# then symlink it: ln -s /etc/nginx/sites-available/minhongo /etc/nginx/sites-enabled/
# ─────────────────────────────────────────────────────────────────────────────

# ── Rate Limiting Zones ──────────────────────────────────────────────────────
# Limit authentication endpoints to 5 requests per minute per IP to prevent brute force
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
# General API rate limit: 60 requests per minute per IP
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;

# ── HTTP Server (Redirect all traffic to HTTPS) ──────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name minhongo.id.vn www.minhongo.id.vn;

    # Let's Encrypt / Certbot challenge directory
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect all HTTP requests to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS Server (Production Application) ────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name minhongo.id.vn www.minhongo.id.vn;

    # ── SSL Certificates (Managed by Let's Encrypt / Certbot) ───────────────
    ssl_certificate /etc/letsencrypt/live/minhongo.id.vn/fullchain.pem; # Managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/minhongo.id.vn/privkey.pem; # Managed by Certbot
    
    # ── SSL Hardening (Based on Mozilla Intermediate configuration) ───────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ── Security Headers (Implements SKILL.md Security checklist) ─────────────
    # Prevent clickjacking
    add_header X-Frame-Options "SAMEORIGIN" always;
    # Prevent MIME-sniffing
    add_header X-Content-Type-Options "nosniff" always;
    # Cross-site scripting protection
    add_header X-XSS-Protection "1; mode=block" always;
    # Strict referrer policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Disable dangerous features
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # HTTP Strict Transport Security (HSTS) - Force HTTPS for 1 year
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    # Content Security Policy (Adjust based on your dynamic resource loading)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https://minhongo.id.vn wss://minhongo.id.vn;" always;

    # ── Optimization ──────────────────────────────────────────────────────────
    client_max_body_size 10M; # Max file upload size (e.g. flashcard image uploads)
    keepalive_timeout 70;

    # ── Logs ──────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/minhongo_access.log;
    error_log /var/log/nginx/minhongo_error.log warn;

    # ── Frontend Router (Reverse Proxy to Docker Frontend) ───────────────────
    location / {
        proxy_pass http://localhost:80; # Points to the Docker Frontend service exposed port
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Disable caching for index.html so updates are immediate
        location = /index.html {
            proxy_pass http://localhost:80/index.html;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }
    }

    # ── Auth Endpoints Rate Limiting (Protects Login/Register/Reset password) ──
    location ~ ^/api/auth/(login|register|reset-password|forgot-password) {
        # Limit authentication requests to avoid brute-forcing
        limit_req zone=auth_limit burst=5 nodelay;
        
        proxy_pass http://localhost:3000; # Forward requests to the NestJS Backend
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Backend API Gateway (Reverse Proxy to Docker NestJS Backend) ──────────
    location /api {
        # General API rate limiting
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://localhost:3000; # Forward requests to the NestJS Backend
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Static Uploads Path (If bypass S3 and upload directly to backend disk) ──
    location /uploads {
        proxy_pass http://localhost:3000/uploads;
        proxy_cache_valid 200 1d;
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }
}
