# ─────────────────────────────────────────────────────────────────────────────
# Minhongo — Docker Compose (Production)
# ─────────────────────────────────────────────────────────────────────────────
# Usage:
#   cp .env.example .env   # fill in real values
#   docker compose up --build -d
#
# Health check:
#   curl http://localhost:3000/health
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-minhongo}
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-minhongo}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # Database is NOT exposed to host by default (security)
    # Uncomment below for debugging only:
    # ports:
    #   - "5432:5432"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M


  # ── NestJS Backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV:      production
      PORT:          3000
      DATABASE_URL:  postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-minhongo}
      JWT_SECRET:    ${JWT_SECRET:?Set JWT_SECRET in .env}
      CORS_ORIGIN:   ${CORS_ORIGIN:-http://localhost}
      FRONTEND_URL:  ${FRONTEND_URL:-http://localhost}
      SMTP_HOST:     ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT:     ${SMTP_PORT:-587}
      SMTP_USER:     ${SMTP_USER:-}
      SMTP_PASS:     ${SMTP_PASS:-}
      SMTP_FROM:     ${SMTP_FROM:-}
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M


  # ── React Frontend (Nginx) ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 32M


volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local
