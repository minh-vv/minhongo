services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-minhongo}
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-minhongo}"]
      interval: 5s
      timeout: 5s
      retries: 10


  # ── NestJS Backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      NODE_ENV:      production
      PORT:          3002
      DATABASE_URL:  postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-minhongo}
      JWT_SECRET:    ${JWT_SECRET:?Set JWT_SECRET in .env}
      CORS_ORIGIN:   ${CORS_ORIGIN:-http://localhost}
      FRONTEND_URL:  ${FRONTEND_URL:-http://localhost}
      SMTP_HOST:     ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT:     ${SMTP_PORT:-587}
      SMTP_USER:     ${SMTP_USER:-}
      SMTP_PASS:     ${SMTP_PASS:-}
      SMTP_FROM:     ${SMTP_FROM:-}
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "3002:3002"
    depends_on:
      db:
        condition: service_healthy


  # ── React Frontend (Nginx) ────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        # Baked in at build time — must be the publicly reachable backend URL
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3002}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend


volumes:
  postgres_data:
  uploads_data:
